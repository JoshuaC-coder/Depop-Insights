<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Depop Insights</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div class="hero-noise"></div>
        <div class="hero-copy">
          <p class="eyebrow">Depop resale intelligence</p>
          <h1>Depop Insights</h1>
          <p class="subtitle">Simple pricing and sell-speed guidance for live listings.</p>
        </div>
        <div class="hero-orb"></div>
      </section>

      <section class="controls">
        <div class="control-row">
          <label for="apiBaseUrl">Backend URL</label>
          <input id="apiBaseUrl" type="text" placeholder="http://127.0.0.1:8000" />
        </div>
        <button id="analyzeButton">Analyze Listing</button>
        <p id="statusMessage" class="status">Open a Depop listing, then run analysis.</p>
      </section>

      <section id="results" class="results hidden">
        <div class="hero-card">
          <div class="hero-card-copy">
            <p class="card-kicker">Suggested price</p>
            <div id="priceRange" class="price-hero">--</div>
          </div>
          <div class="hero-card-side">
            <p id="modeLabel" class="side-mode">Mode</p>
            <p class="side-label">Sell score</p>
            <div id="fastSellScore" class="score-value">--</div>
            <p id="probabilityText" class="score-meta"></p>
            <div class="mini-meter">
              <div id="scoreFill" class="mini-meter-fill"></div>
            </div>
          </div>
        </div>

        <div class="snapshot-grid">
          <article class="snapshot-card">
            <p class="metric-label">ETA</p>
            <p id="daysToSell" class="metric-value">--</p>
          </article>
          <article class="snapshot-card">
            <p class="metric-label">Best next move</p>
            <p id="topSuggestion" class="metric-value metric-value-compact">--</p>
          </article>
        </div>

        <div class="panel-grid">
          <div class="panel panel-mini">
            <div class="panel-header">
              <h2>Good</h2>
            </div>
            <ul id="strengths"></ul>
          </div>

          <div class="panel panel-mini">
            <div class="panel-header">
              <h2>Watch</h2>
            </div>
            <ul id="weaknesses"></ul>
          </div>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
  </html>
